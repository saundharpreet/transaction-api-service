services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: localdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - postgres
    environment:
      # Note the 'db' hostname matches the service name above
      DATABASE_URL: jdbc:postgresql://postgres:5432/localdb
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: secret
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"

volumes:
  postgres_data:
